# SublinkPro Clash/Mihomo template
# Source rules: ACL4SSR Full rule sets, folded into fewer policy groups.
# https://github.com/ACL4SSR/ACL4SSR/tree/master/Clash/config


port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090

dns:
  enable: true
  ipv6: false
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - tls://1.0.0.1:853
    - tls://dns.google:853

proxies: ~

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 手动切换
      - DIRECT

  - name: 手动切换
    type: select
    proxies:
      - __ALL_PROXIES__

  - name: 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - __ALL_PROXIES__

  - name: Ai平台
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换
      - DIRECT

  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 手动切换
      - DIRECT

rules:
  # Local/work domains: force direct, bypass policy groups.
  - DOMAIN,ssh.git.yun,DIRECT
  - DOMAIN,lib.ituohuang.com,DIRECT
  - DOMAIN,sa.linux.yun,DIRECT
  - DOMAIN-SUFFIX,git.yun,DIRECT
  - DOMAIN-SUFFIX,open.yun,DIRECT
  - DOMAIN-SUFFIX,thh.cc,DIRECT
  - DOMAIN-SUFFIX,todesk.com,DIRECT
  - DOMAIN-SUFFIX,todesk.io,DIRECT
  - DOMAIN-SUFFIX,115.com,DIRECT
  - DOMAIN-SUFFIX,docs.qq.com,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve

  # Custom proxy domains.
  - DOMAIN,keke.patricialflores3637.workers.dev,节点选择
  - DOMAIN-SUFFIX,yixi.tv,节点选择
  - DOMAIN-SUFFIX,kekenet.com,节点选择

  # Unity 全家桶走节点
  - DOMAIN-SUFFIX,unity.com,节点选择
  - DOMAIN-SUFFIX,unity3d.com,节点选择
  - DOMAIN-SUFFIX,unitychina.cn,节点选择
  - DOMAIN-SUFFIX,plasticscm.com,节点选择
  # Unity 下载依赖
  - DOMAIN-SUFFIX,aka.ms,节点选择
  - DOMAIN,dl.google.com,节点选择
  - DOMAIN,go.microsoft.com,节点选择
  - DOMAIN,storage.googleapis.com,节点选择

  # ACL4SSR full rule coverage, folded into fewer groups.
  - RULE-SET,LocalAreaNetwork,DIRECT
  - RULE-SET,UnBan,DIRECT
  - RULE-SET,BanAD,REJECT
  - RULE-SET,BanProgramAD,REJECT
  - RULE-SET,GoogleFCM,DIRECT
  - RULE-SET,GoogleCN,DIRECT
  - RULE-SET,SteamCN,DIRECT
  - RULE-SET,Bing,DIRECT
  - RULE-SET,OneDrive,DIRECT
  - RULE-SET,Microsoft,DIRECT
  - RULE-SET,Apple,DIRECT
  - RULE-SET,Telegram,节点选择
  - RULE-SET,AI,Ai平台
  - RULE-SET,OpenAi,Ai平台
  - RULE-SET,NetEaseMusic,DIRECT
  - RULE-SET,Epic,DIRECT
  - RULE-SET,Origin,DIRECT
  - RULE-SET,Sony,DIRECT
  - RULE-SET,Steam,DIRECT
  - RULE-SET,Nintendo,DIRECT
  - RULE-SET,YouTube,节点选择
  - RULE-SET,Netflix,节点选择
  - RULE-SET,Bahamut,节点选择
  - RULE-SET,BilibiliHMT,节点选择
  - RULE-SET,Bilibili,DIRECT
  - RULE-SET,ChinaMedia,DIRECT
  - RULE-SET,ProxyMedia,节点选择
  - RULE-SET,ProxyGFWlist,节点选择
  - RULE-SET,ChinaDomain,DIRECT
  - RULE-SET,ChinaCompanyIp,DIRECT
  - RULE-SET,Download,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,漏网之鱼

rule-providers:
  LocalAreaNetwork:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
    path: ./providers/LocalAreaNetwork.txt
